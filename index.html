<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Dias Corridos</title>
    <link rel="shortcut icon" href="math.png" type="image/png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <button id="botaoTema" class="tema" onclick="alternarTema()">
            🌙
        </button>

        <h1>📅 Calculadora de Dias Corridos</h1>

        <p>
            Bem-vindo!<br>
            Informe as datas abaixo para calcular os dias corridos.
        </p>

        <label for="dataEmissao">
            Data de emissão da nota:
        </label>

        <input type="date" id="dataEmissao">

        <label for="dataPagamento1">
            Data de pagamento boleto (condição 1):
        </label>

        <input type="date" id="dataPagamento1">

        <label for="dataPagamento2">
            Data de pagamento boleto (condição 2):
        </label>

        <input type="date" id="dataPagamento2">

        <button onclick="calcularDias()">
            Calcular
        </button>

        <h2 id="resultado1"></h2>
        <h2 id="resultado2"></h2>

    </div>

    <script src="script.js"></script>

</body>
</html>
